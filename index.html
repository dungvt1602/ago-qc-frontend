<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>AGO QC App</title>
  <link rel="stylesheet" href="styles.css">

  <!-- PWA: cài được như app trên điện thoại -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#3f7f25">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="AGO QC">
</head>
<body>
  <header class="topbar">
    <div>
      <img src="logo.png" class="brand-logo" alt="agofruit">
      <div class="subtitle">QC App - tạo hồ sơ PDF song ngữ</div>
    </div>
    <button id="refreshBtn" class="ghost">Tải lại</button>
  </header>

  <main id="app" class="app"></main>

  <!-- Input ẩn: mở thẳng camera điện thoại (ổn định trong Zalo/Telegram/Facebook) -->
  <input type="file" id="cameraInput" accept="image/*" capture="environment" hidden>

  <div id="cameraModal" class="modal hidden">
    <div class="modal-card camera-card">
      <div class="modal-head">
        <div>
          <b id="cameraTitle">Ảnh QC</b>
          <div id="cameraSub" class="muted"></div>
        </div>
        <button id="closeCamera" class="ghost danger">Đóng</button>
      </div>
      <canvas id="captureCanvas" class="hidden"></canvas>
      <img id="photoPreview" class="hidden photo-preview" alt="Preview">
      <div class="camera-actions">
        <button id="retakeBtn" class="ghost">📷 Chụp lại</button>
        <button id="usePhotoBtn" class="primary">Sử dụng ảnh</button>
      </div>
      <p class="note">Bấm sẽ mở camera điện thoại để chụp. Ảnh tự ghép mã lô, thời gian, nhân viên QC và hạng mục trước khi lưu.</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
